name: Build Native (APK + Desktop)

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

# Nécessaire pour que softprops/action-gh-release puisse créer la Release sur un tag.
permissions:
  contents: write

jobs:
  # ============================================================
  # JOB ANDROID — APK debug non signé via Capacitor
  # ============================================================
  android:
    name: Android APK (debug)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Set up Java 17 (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Install npm dependencies
        run: npm install

      # Capacitor crée le dossier android/ uniquement s'il n'existe pas
      - name: Add Android platform
        run: npx cap add android
        # Ignore l'erreur si la plateforme est déjà présente
        continue-on-error: true

      # Patch AndroidManifest.xml : ajouter CAMERA + RECORD_AUDIO
      # Script Node.js robuste et idempotent — évite les fragilités de sed
      - name: Patch AndroidManifest — CAMERA + RECORD_AUDIO
        run: |
          node - <<'EOF'
          const fs = require('fs');
          const path = 'android/app/src/main/AndroidManifest.xml';
          let xml = fs.readFileSync(path, 'utf8');

          const permissions = [
            '<uses-permission android:name="android.permission.CAMERA"/>',
            '<uses-permission android:name="android.permission.RECORD_AUDIO"/>',
            '<uses-feature android:name="android.hardware.camera" android:required="false"/>',
            '<uses-feature android:name="android.hardware.camera.autofocus" android:required="false"/>',
          ];

          let changed = false;
          for (const perm of permissions) {
            // Idempotent : on détecte par le nom de permission/feature
            const key = perm.match(/android:name="([^"]+)"/)[1];
            if (!xml.includes(key)) {
              xml = xml.replace('</manifest>', `    ${perm}\n</manifest>`);
              changed = true;
            }
          }

          fs.writeFileSync(path, xml, 'utf8');
          console.log(changed ? 'Manifest patched.' : 'Manifest already up-to-date.');
          EOF
          echo "=== AndroidManifest.xml (permissions) ==="
          grep -E "uses-permission|uses-feature" android/app/src/main/AndroidManifest.xml || true

      - name: Copy web assets to Android
        run: npx cap copy android

      - name: Build APK debug
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: librea11y-android-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      # Si déclenché par un tag vX.Y.Z → attacher l'APK à la release GitHub
      - name: Attach APK to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: android/app/build/outputs/apk/debug/app-debug.apk
          name: "LibreA11y ${{ github.ref_name }}"
          body: |
            ## LibreA11y ${{ github.ref_name }}

            ### APK Android (NON SIGNÉ — debug)
            Pour installer sur Android :
            1. Activez « Sources inconnues » dans Paramètres > Sécurité (ou Installer des apps inconnues).
            2. Transférez l'APK sur votre appareil et ouvrez-le.

            Les installeurs bureau (Windows .msi, macOS .dmg, Linux .AppImage/.deb) se trouvent dans les artefacts du job **desktop**.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ============================================================
  # JOB DESKTOP — Tauri v2 (Windows / macOS / Linux)
  # ============================================================
  desktop:
    name: Desktop — ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Set up Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"

      # Dépendances système Linux requises par WebKit2GTK (Tauri v2)
      - name: Install Linux system dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update && sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            build-essential \
            curl \
            wget \
            file

      - name: Install npm dependencies
        run: npm install

      # Générer les icônes multi-résolutions depuis le PNG source 1024×1024
      # tauri icon produit : 32x32.png, 128x128.png, 128x128@2x.png, icon.icns, icon.ico
      - name: Generate icons from PNG
        run: npx @tauri-apps/cli@^2 icon src-tauri/icons/icon.png

      - name: Build Tauri app
        run: npx @tauri-apps/cli@^2 build
        env:
          # Pas de certificat Apple : signature ad-hoc macOS ("-") — évite l'échec
          # codesign « item could not be found in the keychain » causé par une identité
          # vide. L'app n'est pas notarisée (clic droit > Ouvrir au 1er lancement).
          TAURI_SIGNING_PRIVATE_KEY: ""
          APPLE_SIGNING_IDENTITY: "-"

      # Collecter tous les bundles produits (msi, exe, dmg, pkg, deb, rpm, AppImage)
      - name: Upload desktop bundles
        uses: actions/upload-artifact@v4
        with:
          name: librea11y-desktop-${{ matrix.os }}
          path: |
            src-tauri/target/release/bundle/**/*.msi
            src-tauri/target/release/bundle/**/*.exe
            src-tauri/target/release/bundle/**/*.dmg
            src-tauri/target/release/bundle/**/*.pkg
            src-tauri/target/release/bundle/**/*.deb
            src-tauri/target/release/bundle/**/*.rpm
            src-tauri/target/release/bundle/**/*.AppImage
          retention-days: 30
          if-no-files-found: warn

      # Attacher les bundles bureau à la release GitHub (si tag)
      - name: Attach desktop bundles to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            src-tauri/target/release/bundle/**/*.msi
            src-tauri/target/release/bundle/**/*.exe
            src-tauri/target/release/bundle/**/*.dmg
            src-tauri/target/release/bundle/**/*.pkg
            src-tauri/target/release/bundle/**/*.deb
            src-tauri/target/release/bundle/**/*.rpm
            src-tauri/target/release/bundle/**/*.AppImage
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
