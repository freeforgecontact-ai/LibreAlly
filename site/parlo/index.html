<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Parlo — Démo CAA | LibreA11y</title>
<meta name="description" content="Application de communication améliorée et alternative (CAA). Démo hors-ligne, aucune donnée envoyée.">
<style>
/* ===== VARIABLES & RESET ===== */
:root {
  --marine:    #0F4C81;
  --marine-dk: #0A3A63;
  --or:        #F4B81C;
  --or-lt:     #FFD45E;
  --encre:     #16202E;
  --fond:      #F7F9FC;
  --surface:   #FFFFFF;
  --border:    #D0D9E8;
  --focus-ring: #F4B81C;
  --radius:    12px;
  --radius-sm: 8px;
  --shadow:    0 2px 8px rgba(15,76,129,0.12);
  --shadow-hv: 0 4px 16px rgba(15,76,129,0.22);
  --scan-clr:  #F4B81C;
  --tr:        0.15s ease;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  height: 100%;
  font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
  background: var(--fond);
  color: var(--encre);
  font-size: 16px;
  line-height: 1.4;
}

/* ===== FOCUS ===== */
:focus-visible {
  outline: 3px solid var(--focus-ring);
  outline-offset: 3px;
}

/* ===== HEADER ===== */
#app-header {
  background: var(--marine);
  color: #fff;
  padding: 12px 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  box-shadow: 0 2px 8px rgba(10,58,99,0.3);
  position: relative;
  z-index: 10;
  flex-shrink: 0;
}
#header-left { display: flex; align-items: center; gap: 16px; }
#back-link {
  color: var(--or-lt);
  text-decoration: none;
  font-size: 0.9rem;
  display: flex;
  align-items: center;
  gap: 4px;
  padding: 6px 10px;
  border-radius: var(--radius-sm);
  white-space: nowrap;
  transition: background var(--tr);
}
#back-link:hover, #back-link:focus-visible { background: rgba(255,255,255,0.15); color: #fff; }
#app-title {
  font-size: 1.4rem;
  font-weight: 700;
  display: flex;
  align-items: center;
  gap: 8px;
  letter-spacing: -0.3px;
}
#header-notice {
  font-size: 0.72rem;
  color: rgba(255,255,255,0.65);
  text-align: right;
  line-height: 1.3;
}

/* ===== TTS WARNING ===== */
#tts-warning {
  background: #fff3cd;
  color: #7d5000;
  padding: 8px 20px;
  font-size: 0.85rem;
  border-bottom: 1px solid #f4d56a;
  display: none;
  align-items: center;
  gap: 8px;
  flex-shrink: 0;
}
#tts-warning.visible { display: flex; }

/* ===== MAIN LAYOUT ===== */
#app-main {
  display: flex;
  flex-direction: column;
  height: calc(100vh - 56px);
  overflow: hidden;
}

/* ===== PHRASE BAR ===== */
#phrase-section {
  background: var(--surface);
  border-bottom: 2px solid var(--marine);
  padding: 10px 16px 8px;
  flex-shrink: 0;
}
#phrase-chips {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  min-height: 40px;
  margin-bottom: 8px;
  align-items: center;
}
.phrase-chip {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  background: var(--marine);
  color: #fff;
  border-radius: 20px;
  padding: 4px 10px;
  font-size: 0.9rem;
  font-weight: 500;
  animation: chipIn 0.15s ease;
}
@keyframes chipIn {
  from { transform: scale(0.7); opacity: 0; }
  to   { transform: scale(1);   opacity: 1; }
}
@media (prefers-reduced-motion: reduce) {
  .phrase-chip { animation: none; }
}
#phrase-empty-hint {
  color: #8896aa;
  font-style: italic;
  font-size: 0.9rem;
}
#phrase-text-row { display: flex; align-items: center; gap: 10px; }
#phrase-text {
  flex: 1;
  font-size: 1.05rem;
  font-weight: 600;
  color: var(--marine-dk);
  min-height: 24px;
  padding: 2px 4px;
  border-radius: 4px;
  word-break: break-word;
}

/* ===== ACTION BAR ===== */
#action-bar {
  display: flex;
  gap: 8px;
  padding: 10px 16px;
  background: var(--fond);
  border-bottom: 1px solid var(--border);
  flex-wrap: wrap;
  flex-shrink: 0;
}
.action-btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 10px 20px;
  border: none;
  border-radius: var(--radius);
  font-size: 1rem;
  font-weight: 700;
  cursor: pointer;
  min-height: 52px;
  min-width: 80px;
  transition: transform var(--tr), box-shadow var(--tr), background var(--tr);
  -webkit-tap-highlight-color: transparent;
}
.action-btn:active { transform: scale(0.96); }
#btn-speak { background: var(--marine); color: #fff; flex: 1; }
#btn-speak:hover:not(:disabled) { background: var(--marine-dk); box-shadow: var(--shadow-hv); }
#btn-speak:disabled { opacity: 0.45; cursor: not-allowed; }
#btn-back { background: var(--or); color: var(--encre); min-width: 70px; }
#btn-back:hover:not(:disabled) { background: var(--or-lt); box-shadow: var(--shadow); }
#btn-back:disabled { opacity: 0.45; cursor: not-allowed; }
#btn-clear { background: var(--surface); color: var(--encre); border: 2px solid var(--border); min-width: 70px; }
#btn-clear:hover:not(:disabled) { background: #fee2e2; border-color: #f87171; color: #b91c1c; }
#btn-clear:disabled { opacity: 0.45; cursor: not-allowed; }
#btn-settings-toggle {
  background: var(--surface);
  color: var(--marine);
  border: 2px solid var(--marine);
  padding: 10px 14px;
  min-width: unset;
}
#btn-settings-toggle:hover { background: var(--marine); color: #fff; }
#btn-settings-toggle[aria-expanded="true"] { background: var(--marine); color: #fff; }

/* ===== SCAN SELECT BUTTON ===== */
#btn-select-scan {
  display: none;
  background: var(--or);
  color: var(--encre);
  border: 3px solid var(--marine);
  font-size: 1.05rem;
  font-weight: 800;
  padding: 10px 22px;
  border-radius: var(--radius);
  cursor: pointer;
  min-height: 52px;
  align-items: center;
  gap: 6px;
}
#btn-select-scan:hover, #btn-select-scan:focus-visible { background: var(--or-lt); }
body.scan-active #btn-select-scan { display: inline-flex; }

/* ===== SCAN CONTROLS BAR ===== */
#scan-controls {
  display: none;
  align-items: center;
  gap: 12px;
  padding: 8px 16px;
  background: #fff8e1;
  border-bottom: 2px solid var(--or);
  font-size: 0.85rem;
  color: var(--encre);
  flex-shrink: 0;
  flex-wrap: wrap;
}
body.scan-active #scan-controls { display: flex; }
#scan-controls strong { color: var(--marine-dk); }
#scan-controls kbd {
  background: var(--encre);
  color: #fff;
  padding: 1px 6px;
  border-radius: 4px;
  font-size: 0.8rem;
  font-family: monospace;
}

/* ===== SETTINGS PANEL ===== */
#settings-panel {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 16px 20px;
  display: none;
  flex-shrink: 0;
  box-shadow: 0 4px 16px rgba(15,76,129,0.08);
}
#settings-panel.open { display: block; }
#settings-panel h2 { font-size: 1rem; font-weight: 700; color: var(--marine); margin-bottom: 12px; }
.settings-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
  gap: 14px;
}
.setting-row { display: flex; flex-direction: column; gap: 6px; }
.setting-row label { font-size: 0.85rem; font-weight: 600; color: var(--encre); }
.setting-row input[type="range"] {
  width: 100%;
  accent-color: var(--marine);
  cursor: pointer;
}
.setting-row select {
  padding: 7px 10px;
  border: 2px solid var(--border);
  border-radius: var(--radius-sm);
  font-size: 0.9rem;
  background: var(--fond);
  color: var(--encre);
  cursor: pointer;
}
.setting-row select:focus-visible { border-color: var(--marine); outline: none; }

/* Toggle */
.toggle-wrap { display: flex; align-items: center; gap: 10px; }
.toggle-wrap > label:last-child { font-size: 0.9rem; font-weight: 500; cursor: pointer; }
.toggle { position: relative; width: 48px; height: 26px; flex-shrink: 0; }
.toggle input { opacity: 0; width: 0; height: 0; position: absolute; }
.toggle-track {
  position: absolute; inset: 0;
  background: #cdd5df;
  border-radius: 13px;
  transition: background 0.2s;
  cursor: pointer;
}
.toggle input:checked + .toggle-track { background: var(--marine); }
.toggle-thumb {
  position: absolute; top: 3px; left: 3px;
  width: 20px; height: 20px;
  background: #fff;
  border-radius: 50%;
  transition: transform 0.2s;
  pointer-events: none;
  box-shadow: 0 1px 4px rgba(0,0,0,0.2);
}
.toggle input:checked ~ .toggle-thumb { transform: translateX(22px); }
.toggle:focus-within .toggle-track { outline: 3px solid var(--focus-ring); outline-offset: 2px; }

/* ===== TABS ===== */
#tabs-bar {
  display: flex;
  gap: 4px;
  padding: 10px 16px 0;
  background: var(--fond);
  overflow-x: auto;
  scrollbar-width: thin;
  flex-shrink: 0;
  border-bottom: 2px solid var(--border);
}
.tab-btn {
  padding: 8px 14px;
  border: 2px solid transparent;
  border-bottom: none;
  border-radius: var(--radius-sm) var(--radius-sm) 0 0;
  background: var(--surface);
  color: var(--marine);
  font-size: 0.88rem;
  font-weight: 600;
  cursor: pointer;
  white-space: nowrap;
  min-height: 40px;
  transition: background var(--tr), color var(--tr);
}
.tab-btn:hover { background: #e8eef7; }
.tab-btn[aria-selected="true"] {
  background: var(--marine);
  color: #fff;
  border-color: var(--marine);
}

/* ===== SYMBOL GRID ===== */
#grid-wrapper {
  flex: 1;
  overflow-y: auto;
  padding: 14px 16px 60px;
  scrollbar-width: thin;
}
.symbol-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
  gap: 10px;
}
.sym-btn {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 6px;
  min-height: 90px;
  padding: 12px 8px;
  background: var(--surface);
  border: 2px solid var(--border);
  border-radius: var(--radius);
  cursor: pointer;
  font-size: 0.9rem;
  font-weight: 600;
  color: var(--encre);
  transition: transform var(--tr), box-shadow var(--tr), border-color var(--tr), background var(--tr);
  -webkit-tap-highlight-color: transparent;
  box-shadow: var(--shadow);
  text-align: center;
  word-break: break-word;
  hyphens: auto;
}
.sym-btn .sym-emoji { font-size: 2rem; line-height: 1; display: block; }
.sym-btn:hover {
  border-color: var(--marine);
  background: #edf3fb;
  box-shadow: var(--shadow-hv);
  transform: translateY(-2px);
}
.sym-btn:active { transform: scale(0.94); background: #dce8f8; }
@media (prefers-reduced-motion: reduce) {
  .sym-btn:hover { transform: none; }
  .sym-btn:active { transform: none; }
}
.sym-btn.accent { border-color: var(--or); background: #fffbef; }
.sym-btn.accent:hover { background: #fff3cc; border-color: var(--or); }

/* ===== SCANNING HIGHLIGHT ===== */
.scan-focus {
  outline: 4px solid var(--scan-clr) !important;
  outline-offset: 2px !important;
  box-shadow: 0 0 0 6px rgba(244,184,28,0.35) !important;
  background: #fff8e1 !important;
}
/* No blinking/flashing — just a static highlight respecting prefers-reduced-motion */
@media (prefers-reduced-motion: reduce) {
  .scan-focus { box-shadow: 0 0 0 6px rgba(244,184,28,0.5) !important; }
}

/* ===== STATUS TOAST ===== */
#status-msg {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  background: var(--encre);
  color: #fff;
  padding: 8px 20px;
  border-radius: 24px;
  font-size: 0.9rem;
  font-weight: 500;
  z-index: 200;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.25s ease;
  white-space: nowrap;
  max-width: 90vw;
  text-align: center;
}
#status-msg.show { opacity: 1; }

/* ===== RESPONSIVE ===== */
@media (max-width: 600px) {
  #app-title { font-size: 1.1rem; }
  #header-notice { display: none; }
  .symbol-grid { grid-template-columns: repeat(auto-fill, minmax(85px, 1fr)); }
  .sym-btn { min-height: 74px; }
  .sym-btn .sym-emoji { font-size: 1.6rem; }
  .action-btn { padding: 10px 12px; font-size: 0.9rem; }
}
</style>
</head>
<body>

<!-- ===== HEADER ===== -->
<header id="app-header" role="banner">

    100&nbsp;% hors-ligne &middot; aucune donn&eacute;e envoy&eacute;e

</header>

<!-- ===== TTS WARNING ===== -->
<div id="tts-warning" role="status" aria-live="polite"></div>

<!-- ===== MAIN ===== -->
<main id="app-main">

  <!-- PHRASE BAR -->
  <section id="phrase-section" aria-label="Phrase en cours de composition">
    <div id="phrase-chips"
         aria-live="polite"
         aria-relevant="additions removals"
         aria-label="Symboles s&eacute;lectionn&eacute;s">
      <span id="phrase-empty-hint" aria-hidden="true">Appuyez sur des symboles pour composer une phrase&hellip;</span>
    </div>
    <div id="phrase-text-row">
      <div id="phrase-text" aria-hidden="true"></div>
    </div>
  </section>

  <!-- ACTION BAR -->
  <div id="action-bar" role="toolbar" aria-label="Actions">
    <button class="action-btn" id="btn-speak" aria-label="Prononcer la phrase" disabled>
      <span aria-hidden="true">&#x1F50A;</span> Parler
    </button>
    <button class="action-btn" id="btn-back" aria-label="Supprimer le dernier mot" disabled>
      <span aria-hidden="true">&#x232B;</span> Retour
    </button>
    <button class="action-btn" id="btn-clear" aria-label="Effacer toute la phrase" disabled>
      <span aria-hidden="true">&#x2715;</span> Effacer
    </button>
    <button class="action-btn" id="btn-settings-toggle"

    </button>
    <button id="btn-select-scan" aria-label="S&eacute;lectionner l'&eacute;l&eacute;ment en surbrillance (mode balayage)">
      <span aria-hidden="true">&#x2705;</span> S&eacute;lectionner
    </button>
  </div>

  <!-- SCANNING INFO BAR -->
  <div id="scan-controls" aria-live="polite" aria-atomic="false">
    <strong>Mode balayage actif</strong>
    &mdash; Appuyez sur <kbd>Espace</kbd> ou <kbd>Entr&eacute;e</kbd> (ou le bouton &#x2705;) pour s&eacute;lectionner.
    <label style="margin-left:auto;display:flex;align-items:center;gap:6px;white-space:nowrap;">
      Vitesse&nbsp;:
      <input type="range" id="scan-speed" min="500" max="3000" step="100" value="1500"
             style="width:90px;accent-color:var(--marine);"
             aria-label="Vitesse de balayage">
      <span id="scan-speed-label" style="min-width:36px;font-weight:700;">1.5s</span>
    </label>
  </div>

  <!-- SETTINGS PANEL -->
  <div id="settings-panel" role="region" aria-label="R&eacute;glages de la voix">
    <h2>&#x2699;&#xFE0F; R&eacute;glages</h2>
    <div class="settings-grid">

      <div class="setting-row">
        <label for="voice-select">Voix</label>
        <select id="voice-select" aria-label="Choisir la voix de synth&egrave;se">
          <option>Chargement des voix&hellip;</option>
        </select>
      </div>

      <div class="setting-row">
        <label for="rate-slider">Vitesse de parole&nbsp;: <span id="rate-label">1.00</span></label>
        <input type="range" id="rate-slider"
               min="0.5" max="1.5" step="0.05" value="1.0"
               aria-valuemin="0.5" aria-valuemax="1.5" aria-valuenow="1.0"
               aria-label="Vitesse de parole">
      </div>

      <div class="setting-row">
        <label for="pitch-slider">Hauteur&nbsp;: <span id="pitch-label">1.00</span></label>
        <input type="range" id="pitch-slider"
               min="0.5" max="2.0" step="0.05" value="1.0"
               aria-valuemin="0.5" aria-valuemax="2.0" aria-valuenow="1.0"
               aria-label="Hauteur de la voix">
      </div>

      <div class="setting-row" style="justify-content:center;">
        <div class="toggle-wrap">
          <label class="toggle">
            <input type="checkbox" id="speak-each-toggle">
            <span class="toggle-track" aria-hidden="true"></span>
            <span class="toggle-thumb" aria-hidden="true"></span>
          </label>
          <label for="speak-each-toggle">Prononcer chaque mot &agrave; l&rsquo;ajout</label>
        </div>
      </div>

      <div class="setting-row" style="justify-content:center;">
        <div class="toggle-wrap">
          <label class="toggle">
            <input type="checkbox" id="scan-mode-toggle">
            <span class="toggle-track" aria-hidden="true"></span>
            <span class="toggle-thumb" aria-hidden="true"></span>
          </label>
          <label for="scan-mode-toggle">Mode balayage (contacteur)</label>
        </div>
      </div>

    </div>
  </div>

  <!-- CATEGORY TABS -->
  <div id="tabs-bar" role="tablist" aria-label="Cat&eacute;gories de symboles"></div>

  <!-- SYMBOL GRID -->
  <div id="grid-wrapper">
    <div class="symbol-grid" id="symbol-grid" role="grid" aria-label="Symboles"></div>
  </div>

</main>

<!-- STATUS TOAST -->
<div id="status-msg" role="status" aria-live="assertive" aria-atomic="true"></div>

    },
    {
      id: 'personnes', label: '👨‍👩‍👧 Personnes',
      symbols: [
        { emoji: '👩', word: 'maman'    },
        { emoji: '👨', word: 'papa'     },
        { emoji: '🏠', word: 'maison'   },
        { emoji: '🏫', word: '\xE9cole' },
        { emoji: '🌳', word: 'dehors'   },
        { emoji: '👨‍⚕️', word: 'docteur' },
        { emoji: '🤗', word: 'ami'      }
      ]
    }
  ];

  /* ============================================================
     STATE
  ============================================================ */
  var phrase       = [];
  var currentCat   = 0;
  var voices       = [];
  var voiceList    = [];   // filtered list shown in select
  var selectedVoice= null;
  var rate         = 1.0;
  var pitch        = 1.0;
  var speakEach    = false;
  var scanMode     = false;
  var scanIndex    = 0;
  var scanItems    = [];
  var scanSpeed    = 1500;
  var scanTimer    = null;
  var statusTimer  = null;

  /* ============================================================
     DOM REFS
  ============================================================ */
  var phraseChips      = document.getElementById('phrase-chips');
  var phraseEmptyHint  = document.getElementById('phrase-empty-hint');
  var phraseTextEl     = document.getElementById('phrase-text');
  var btnSpeak         = document.getElementById('btn-speak');
  var btnBack          = document.getElementById('btn-back');
  var btnClear         = document.getElementById('btn-clear');
  var btnSettingsTog   = document.getElementById('btn-settings-toggle');
  var settingsPanel    = document.getElementById('settings-panel');
  var voiceSelect      = document.getElementById('voice-select');
  var rateSlider       = document.getElementById('rate-slider');
  var rateLabel        = document.getElementById('rate-label');
  var pitchSlider      = document.getElementById('pitch-slider');
  var pitchLabel       = document.getElementById('pitch-label');
  var speakEachToggle  = document.getElementById('speak-each-toggle');
  var scanModeToggle   = document.getElementById('scan-mode-toggle');
  var scanSpeedInput   = document.getElementById('scan-speed');
  var scanSpeedLabel   = document.getElementById('scan-speed-label');
  var tabsBar          = document.getElementById('tabs-bar');
  var symbolGrid       = document.getElementById('symbol-grid');
  var ttsWarning       = document.getElementById('tts-warning');
  var statusMsg        = document.getElementById('status-msg');
  var btnSelectScan    = document.getElementById('btn-select-scan');

  /* ============================================================
     TTS
  ============================================================ */
  var hasTTS = (typeof window !== 'undefined' && 'speechSynthesis' in window);

  if (!hasTTS) {
    setWarning("⚠️ La synth\xE8se vocale n’est pas disponible dans ce navigateur. L’interface reste utilisable.");
    btnSpeak.disabled = true;
  }

  function setWarning(msg) {
    ttsWarning.textContent = msg;
    ttsWarning.classList.add('visible');
  }

  function loadVoices() {
    if (!hasTTS) return;
    var v = window.speechSynthesis.getVoices();
    if (!v || v.length === 0) return;
    voices = v;
    buildVoiceSelect();
  }

  function buildVoiceSelect() {
    var frVoices  = voices.filter(function(v) { return v.lang && v.lang.indexOf('fr') === 0; });
    voiceList     = frVoices.length > 0 ? frVoices : voices;

    if (frVoices.length === 0 && voices.length > 0) {
      setWarning('⚠️ Voix fran\xE7aise indisponible sur cet appareil — voix par d\xE9faut utilis\xE9e.');
    }

    voiceSelect.innerHTML = '';
    voiceList.forEach(function(v, i) {
      var opt = document.createElement('option');
      opt.value = String(i);
      opt.textContent = v.name + ' (' + v.lang + ')';
      voiceSelect.appendChild(opt);
    });

    // Pick best French voice
    var best = -1;
    for (var i = 0; i < voiceList.length; i++) {
      var lang = voiceList[i].lang || '';
      if (lang === 'fr-FR') { best = i; break; }
      if (lang.indexOf('fr') === 0 && best === -1) { best = i; }
    }
    if (best >= 0) voiceSelect.selectedIndex = best;
    selectedVoice = voiceList[voiceSelect.selectedIndex] || null;
  }

  if (hasTTS) {
    loadVoices();
    if (typeof window.speechSynthesis.onvoiceschanged !== 'undefined') {
      window.speechSynthesis.addEventListener('voiceschanged', loadVoices);
    }
    // Async fallback (some browsers)
    setTimeout(loadVoices, 250);
    setTimeout(loadVoices, 800);
  }

  voiceSelect.addEventListener('change', function () {
    selectedVoice = voiceList[parseInt(voiceSelect.value, 10)] || null;
  });

  function speak(text) {
    if (!hasTTS || !text || !text.trim()) return;
    window.speechSynthesis.cancel();
    var utt  = new SpeechSynthesisUtterance(text);
    utt.lang  = 'fr-FR';
    utt.rate  = rate;
    utt.pitch = pitch;
    if (selectedVoice) utt.voice = selectedVoice;
    window.speechSynthesis.speak(utt);
  }

  /* ============================================================
     PHRASE
  ============================================================ */
  function buildText() {
    return phrase.map(function(s) { return s.word; }).join(' ');
  }

  function escH(s) {
    return s
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  function renderPhrase() {
    // Remove all children
    while (phraseChips.firstChild) phraseChips.removeChild(phraseChips.firstChild);

    if (phrase.length === 0) {
      phraseChips.appendChild(phraseEmptyHint);
      phraseTextEl.textContent = '';
    } else {
      phrase.forEach(function(s) {
        var chip = document.createElement('span');
        chip.className = 'phrase-chip';
        chip.setAttribute('aria-label', s.word);
        chip.innerHTML = '<span aria-hidden="true">' + s.emoji + '</span>&nbsp;' + escH(s.word);
        phraseChips.appendChild(chip);
      });
      phraseTextEl.textContent = buildText();
    }

    var empty = phrase.length === 0;
    btnSpeak.disabled = empty;
    btnBack.disabled  = empty;
    btnClear.disabled = empty;
  }

  function addSymbol(sym) {
    phrase.push({ emoji: sym.emoji, word: sym.word });
    renderPhrase();
    if (speakEach) speak(sym.word);
    showStatus('+ ' + sym.word);
  }

  function removeLast() {
    if (phrase.length === 0) return;
    var removed = phrase.pop();
    renderPhrase();
    showStatus('Supprim\xE9 : ' + removed.word);
  }

  function clearPhrase() {
    if (phrase.length === 0) return;
    phrase = [];
    renderPhrase();
    showStatus('Phrase effac\xE9e');
  }

  /* ============================================================
     STATUS TOAST
  ============================================================ */
  function showStatus(msg) {
    statusMsg.textContent = msg;
    statusMsg.classList.add('show');
    if (statusTimer) clearTimeout(statusTimer);
    statusTimer = setTimeout(function () {
      statusMsg.classList.remove('show');
    }, 2000);
  }

  /* ============================================================
     TABS
  ============================================================ */
  function buildTabs() {
    CATEGORIES.forEach(function(cat, i) {
      var btn = document.createElement('button');
      btn.className = 'tab-btn';
      btn.setAttribute('role', 'tab');
      btn.setAttribute('aria-selected', i === 0 ? 'true' : 'false');
      btn.setAttribute('aria-controls', 'symbol-grid');
      btn.setAttribute('id', 'tab-' + cat.id);
      btn.setAttribute('data-idx', String(i));
      btn.textContent = cat.label;

      btn.addEventListener('click', function () { switchTab(i); });

      btn.addEventListener('keydown', function (e) {
        var next = i;
        if (e.key === 'ArrowRight') next = (i + 1) % CATEGORIES.length;
        else if (e.key === 'ArrowLeft') next = (i - 1 + CATEGORIES.length) % CATEGORIES.length;
        else return;
        e.preventDefault();
        switchTab(next);
        var tabs = tabsBar.querySelectorAll('.tab-btn');
        if (tabs[next]) tabs[next].focus();
      });

      tabsBar.appendChild(btn);
    });
  }

  function switchTab(idx) {
    currentCat = idx;
    var tabs = tabsBar.querySelectorAll('.tab-btn');
    tabs.forEach(function(btn, i) {
      btn.setAttribute('aria-selected', i === idx ? 'true' : 'false');
    });
    buildGrid(idx);
    if (scanMode) restartScan();
  }

  /* ============================================================
     SYMBOL GRID
  ============================================================ */
  function buildGrid(catIdx) {
    symbolGrid.innerHTML = '';
    CATEGORIES[catIdx].symbols.forEach(function(sym) {
      var btn = document.createElement('button');
      btn.className = 'sym-btn' + (sym.accent ? ' accent' : '');
      btn.setAttribute('aria-label', sym.word);
      btn.setAttribute('type', 'button');
      btn.innerHTML =
        '<span class="sym-emoji" aria-hidden="true">' + sym.emoji + '</span>' +
        '<span>' + escH(sym.word) + '</span>';
      btn.addEventListener('click', function () { addSymbol(sym); });
      symbolGrid.appendChild(btn);
    });
  }

  // Arrow key navigation in grid
  symbolGrid.addEventListener('keydown', function (e) {
    if (scanMode) return;
    var btns = Array.prototype.slice.call(symbolGrid.querySelectorAll('.sym-btn'));
    var idx  = btns.indexOf(document.activeElement);
    if (idx === -1) return;

    // Approximate columns from grid width
    var btnW  = btns[0] ? btns[0].offsetWidth + 10 : 120;
    var cols  = Math.max(1, Math.floor((symbolGrid.offsetWidth + 10) / btnW));
    var next  = idx;

    if      (e.key === 'ArrowRight') next = Math.min(idx + 1, btns.length - 1);
    else if (e.key === 'ArrowLeft')  next = Math.max(idx - 1, 0);
    else if (e.key === 'ArrowDown')  next = Math.min(idx + cols, btns.length - 1);
    else if (e.key === 'ArrowUp')    next = Math.max(idx - cols, 0);
    else return;

    e.preventDefault();
    btns[next].focus();
  });

  /* ============================================================
     ACTION BUTTONS
  ============================================================ */
  btnSpeak.addEventListener('click', function () {
    var t = buildText();
    if (t) { speak(t); showStatus('Lecture…'); }
  });
  btnBack.addEventListener('click', removeLast);
  btnClear.addEventListener('click', clearPhrase);

  /* ============================================================
     SETTINGS PANEL
  ============================================================ */
  btnSettingsTog.addEventListener('click', function () {
    var open = settingsPanel.classList.toggle('open');
    btnSettingsTog.setAttribute('aria-expanded', open ? 'true' : 'false');
    if (open) {
      var first = settingsPanel.querySelector('select, input');
      if (first) first.focus();
    }
  });

  rateSlider.addEventListener('input', function () {
    rate = parseFloat(rateSlider.value);
    rateLabel.textContent  = rate.toFixed(2);
    rateSlider.setAttribute('aria-valuenow', rate.toFixed(2));
  });

  pitchSlider.addEventListener('input', function () {
    pitch = parseFloat(pitchSlider.value);
    pitchLabel.textContent = pitch.toFixed(2);
    pitchSlider.setAttribute('aria-valuenow', pitch.toFixed(2));
  });

  speakEachToggle.addEventListener('change', function () {
    speakEach = speakEachToggle.checked;
  });

  scanModeToggle.addEventListener('change', function () {
    scanMode = scanModeToggle.checked;
    if (scanMode) {
      document.body.classList.add('scan-active');
      startScan();
    } else {
      document.body.classList.remove('scan-active');
      stopScan();
    }
  });

  scanSpeedInput.addEventListener('input', function () {
    scanSpeed = parseInt(scanSpeedInput.value, 10);
    scanSpeedLabel.textContent = (scanSpeed / 1000).toFixed(1) + 's';
    if (scanMode) restartScan();
  });

  /* ============================================================
     SCANNING MODE
  ============================================================ */
  function getScanItems() {
    var items = [];
    // Action buttons (skip disabled)
    [btnSpeak, btnBack, btnClear].forEach(function (b) {
      if (!b.disabled) items.push(b);
    });
    // Tabs
    var tabs = tabsBar.querySelectorAll('.tab-btn');
    tabs.forEach(function (b) { items.push(b); });
    // Symbols
    var syms = symbolGrid.querySelectorAll('.sym-btn');
    syms.forEach(function (b) { items.push(b); });
    return items;
  }

  function clearScanHL() {
    var els = document.querySelectorAll('.scan-focus');
    els.forEach(function (el) { el.classList.remove('scan-focus'); });
  }

  function applyScanHL(idx) {
    clearScanHL();
    if (!scanItems.length) return;
    var el = scanItems[idx];
    if (el) {
      el.classList.add('scan-focus');
      el.scrollIntoView({ block: 'nearest' });
    }
  }

  function startScan() {
    scanItems = getScanItems();
    if (!scanItems.length) return;
    scanIndex = 0;
    applyScanHL(scanIndex);
    clearInterval(scanTimer);
    scanTimer = setInterval(function () {
      scanIndex = (scanIndex + 1) % scanItems.length;
      applyScanHL(scanIndex);
    }, scanSpeed);
  }

  function stopScan() {
    clearInterval(scanTimer);
    clearScanHL();
    scanItems = [];
  }

  function restartScan() {
    stopScan();
    startScan();
  }

  function selectCurrentScanItem() {
    if (!scanMode || !scanItems.length) return;
    var el = scanItems[scanIndex];
    if (el) {
      el.click();
      // Rebuild after action (phrase state or tab may have changed)
      setTimeout(function () {
        scanItems = getScanItems();
        if (scanIndex >= scanItems.length) scanIndex = 0;
        applyScanHL(scanIndex);
      }, 100);
    }
  }

  btnSelectScan.addEventListener('click', selectCurrentScanItem);

  // Global keyboard trigger for scan
  document.addEventListener('keydown', function (e) {
    if (!scanMode) return;
    if (e.key !== ' ' && e.key !== 'Enter') return;
    var tag = document.activeElement ? document.activeElement.tagName.toUpperCase() : '';
    if (tag === 'INPUT' || tag === 'SELECT' || tag === 'TEXTAREA' || tag === 'BUTTON') return;
    e.preventDefault();
    selectCurrentScanItem();
  });

  /* ============================================================
     INIT
  ============================================================ */
  buildTabs();
  buildGrid(0);
  renderPhrase();

}());
</script>
</body>
</html>
